            --text: #1e2a3a;
            --text-muted: #4a627a;
            --border: #cbd5e1;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;

            margin-top: 2rem;

        .toolbar {

            font-weight: 600;

        .card {

            padding: 1.5rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card-img {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }

            background: var(--card-bg);
            border-radius: 32px;
            padding: 1.8rem;
            margin: 1rem 0;

            color: var(--text);
        }

            background: var(--bg);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
        }

        .lang-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: baseline;
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-bottom: 1px dashed var(--border);
        }

        .lang-text {
            flex: 1;
            font-size: 1rem;
            cursor: pointer;
        }
        .lang-text:hover {
            color: var(--primary);
        }

        .lang-label {
            font-weight: bold;
            width: 70px;
            color: var(--primary);
        }

        .audio-icon {
            cursor: pointer;
            margin-left: 0.6rem;
            font-size: 1.2rem;
            color: var(--success);
        }

        .pronoun-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0;
        }

        .pronoun-btn {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.3rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .pronoun-table-container {
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 20px;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: var(--primary);
            color: white;
        }

        /* セルをクリック可能に */
        td {
            cursor: pointer;
            transition: background 0.1s;
        }
        td:hover {
            background: var(--cell-hover);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .lang-row {
                flex-direction: column;
            }
            .lang-label {
                width: auto;
            }
            th, td {
                padding: 8px 4px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

            // 他の助詞はそのままローマ字読みになるが自然
        }

        const langMap = { jp: 'ja-JP', tt: 'tt', ru: 'ru-RU', en: 'en-US' };
        utterance.lang = langMap[langCode] || 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

            acc: { jp:"彼を", tt:"аны", ru:"его", en:"him" },
            dat: { jp:"彼に", tt:"аңа", ru:"ему", en:"to him" },
            abl: { jp:"彼から/で", tt:"аннан", ru:"от него / им", en:"from him / by him" }
        }},
        { name: "彼女 / she / она / ул", forms: {
            nom: { jp:"彼女", tt:"ул", ru:"она", en:"she" },
            gen: { jp:"彼女の", tt:"аның", ru:"её", en:"her" },
            acc: { jp:"彼女を", tt:"аны", ru:"её", en:"her" },
            dat: { jp:"彼女に", tt:"аңа", ru:"ей", en:"to her" },
            abl: { jp:"彼女から/で", tt:"аннан", ru:"от неё / ею", en:"from her / by her" }
        }},
        { name: "それ / it / оно / ул", forms: {
            nom: { jp:"それ", tt:"ул", ru:"оно", en:"it" },
            gen: { jp:"それの", tt:"аның", ru:"его", en:"its" },
            acc: { jp:"それを", tt:"аны", ru:"его", en:"it" },
            dat: { jp:"それに", tt:"аңа", ru:"ему", en:"to it" },
            abl: { jp:"それから/で", tt:"аннан", ru:"от него / им", en:"from it / by it" }
        }},
        { name: "私達 / we / мы / без", forms: {
            nom: { jp:"私達", tt:"без", ru:"мы", en:"we" },
            gen: { jp:"私達の", tt:"безнең", ru:"нас", en:"our" },
            acc: { jp:"私達を", tt:"безне", ru:"нас", en:"us" },
            dat: { jp:"私達に", tt:"безгә", ru:"нам", en:"to us" },
            abl: { jp:"私達から/で", tt:"бездән", ru:"от нас / нами", en:"from us / by us" }
        }},
        { name: "あなた達 / you (pl) / вы / сез", forms: {
            nom: { jp:"あなた達", tt:"сез", ru:"вы", en:"you (pl)" },
            gen: { jp:"あなた達の", tt:"сезнең", ru:"вас", en:"your (pl)" },
            acc: { jp:"あなた達を", tt:"сезне", ru:"вас", en:"you (pl)" },
            dat: { jp:"あなた達に", tt:"сезгә", ru:"вам", en:"to you (pl)" },
            abl: { jp:"あなた達から/で", tt:"сездән", ru:"от вас / вами", en:"from you / by you (pl)" }
        }},
        { name: "彼ら / they (m) / они / алар", forms: {
            nom: { jp:"彼ら", tt:"алар", ru:"они", en:"they (m)" },
            gen: { jp:"彼らの", tt:"аларның", ru:"их", en:"their" },
            acc: { jp:"彼らを", tt:"аларны", ru:"их", en:"them" },
            dat: { jp:"彼らに", tt:"аларга", ru:"им", en:"to them" },
            abl: { jp:"彼らから/で", tt:"алардан", ru:"от них / ими", en:"from them / by them" }
        }},
        { name: "彼女ら / they (f) / они / алар", forms: {
            nom: { jp:"彼女ら", tt:"алар", ru:"они", en:"they (f)" },
            gen: { jp:"彼女らの", tt:"аларның", ru:"их", en:"their" },
            acc: { jp:"彼女らを", tt:"аларны", ru:"их", en:"them" },
            dat: { jp:"彼女らに", tt:"аларга", ru:"им", en:"to them" },
            abl: { jp:"彼女らから/で", tt:"алардан", ru:"от них / ими", en:"from them / by them" }
        }}
    ];

    // UIを現在の言語に更新
    function updateUI() {
        const t = uiText[currentUiLang];
        document.getElementById('appTitle').innerText = t.appTitle;
        document.getElementById('cardPatternsTitle').innerHTML = t.cardPatternsTitle;
        document.getElementById('cardPatternsDesc').innerText = t.cardPatternsDesc;
        document.getElementById('cardPhrasesTitle').innerHTML = t.cardPhrasesTitle;
        document.getElementById('cardPhrasesDesc').innerText = t.cardPatternsDesc; // 修正（原典ではcardPhrasesDescがなかったのでcardPatternsDescを流用）
        document.getElementById('cardPronounsTitle').innerHTML = t.cardPronounsTitle;
        document.getElementById('cardPronounsDesc').innerText = t.cardPronounsDesc;
        document.getElementById('footerContact').innerText = t.footerContact;
        // 詳細表示中の場合も内容を再描画する必要があるが、詳細内の動的要素はshowDetail内部で毎回生成されるので、次回の表示時に新しい言語が適用される。
    }

    // 言語切り替えボタンのアクティブ表示
    function setActiveLangButton(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // 表のセルクリックで発音
    function attachCellSpeak(container) {
        container.querySelectorAll('td').forEach(cell => {
            cell.removeEventListener('click', cell._speakHandler);
            const lang = cell.getAttribute('data-lang');
            const text = cell.getAttribute('data-text') || cell.innerText.trim();
            if (lang && text) {
                const handler = () => speakText(text, lang);
                cell.addEventListener('click', handler);
                cell._speakHandler = handler;
            }
        });
    }

    // 人称代名詞の詳細表示（英語ケース名 + 各セルクリック発音）
    function showPronounTable(pronoun) {
        const container = document.getElementById('pronounDetailArea');
        const caseNames = {
            nom: "Nominative (〜は/が)",
            gen: "Genitive (〜の)",
            acc: "Accusative (〜を)",
            dat: "Dative (〜に/へ)",
            abl: "Ablative (〜から/〜で)"
        };
        let html = `<div class="pronoun-table-container"><table><thead><tr>
            <th>Case</th><th>日本語</th><th>Татарча</th><th>Русский</th><th>English</th>
        </tr></thead><tbody>`;
        for (let [caseKey, caseLabel] of Object.entries(caseNames)) {
            const f = pronoun.forms[caseKey];
            html += `<tr>
                <td>${caseLabel}</td>
                <td data-lang="jp" data-text="${f.jp}">${f.jp}</td>
                <td data-lang="tt" data-text="${f.tt}">${f.tt}</td>
                <td data-lang="ru" data-text="${f.ru}">${f.ru}</td>
                <td data-lang="en" data-text="${f.en}">${f.en}</td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        attachCellSpeak(container);
    }

    // 詳細ビューの描画 (文型、フレーズ、人称)
    function showDetail(section) {
        const mainDiv = document.getElementById('mainView');
        const detailDiv = document.getElementById('detailView');
        mainDiv.style.display = 'none';
        detailDiv.style.display = 'block';
        const backText = uiText[currentUiLang].backBtn;
        let html = `<button class="back-btn" id="backToMainBtn"><i class="fas fa-arrow-left"></i> ${backText}</button>`;
        html += `<div class="detail-view">`;

        if (section === 'patterns') {
            html += `<h2>${uiText[currentUiLang].patternsHeader}</h2>`;
            for (let i=0; i<patternsData.length; i+=2) {
                const pattern = patternsData[i];
                const sample = patternsData[i+1].samples[0];
                html += `<div class="pattern-card"><h3>${pattern.title_jp} / ${pattern.title_en}</h3>`;
                for (let lang of ['jp','tt','ru','en']) {
                    const text = sample[lang];
                    html += `<div class="lang-row">
                        <div class="lang-label">${lang.toUpperCase()}</div>
                        <div class="lang-text" data-lang="${lang}" data-text="${text.replace(/['"]/g, '&quot;')}">${text}</div>
                    </div>`;
                }
                html += `</div>`;
            }
        } else if (section === 'phrases') {
            html += `<h2>${uiText[currentUiLang].phrasesHeader}</h2>`;
            allPhrases.forEach((phrase, idx) => {
                html += `<div class="phrase-card"><strong>${idx+1}.</strong>`;
                for (let lang of ['jp','tt','ru','en']) {
                    const text = phrase[lang];
                    html += `<div class="lang-row">
                        <div class="lang-label">${lang.toUpperCase()}</div>
                        <div class="lang-text" data-lang="${lang}" data-text="${text.replace(/['"]/g, '&quot;')}">${text}</div>
                    </div>`;
                }
                html += `</div>`;
            });
        } else if (section === 'pronouns') {
            html += `<h2>${uiText[currentUiLang].cardPronounsTitle}</h2>`;
            html += `<div class="pronoun-grid" id="pronounButtonsGrid"></div>`;
            html += `<div id="pronounDetailArea" style="margin-top: 24px;"></div>`;
            detailDiv.innerHTML = html;
            const grid = document.getElementById('pronounButtonsGrid');
            pronounsList.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'pronoun-btn';
                btn.innerText = p.name;
                btn.onclick = () => showPronounTable(p);
                grid.appendChild(btn);
            });
            if (pronounsList.length) showPronounTable(pronounsList[0]);
            attachCellSpeak(detailDiv);
            document.getElementById('backToMainBtn')?.addEventListener('click', backHandler);
            return;
        }

        detailDiv.innerHTML = html;
        // セルクリック発音をアタッチ
        detailDiv.querySelectorAll('.lang-text').forEach(el => {
            const lang = el.getAttribute('data-lang');
            const text = el.getAttribute('data-text');
            if (lang && text) {
                el.addEventListener('click', () => speakText(text, lang));
            }
        });
        document.getElementById('backToMainBtn')?.addEventListener('click', backHandler);
    }

    function backHandler() {
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('detailView').style.display = 'none';
        window.speechSynthesis.cancel();
    }

    // 初期化とイベント
    document.addEventListener('DOMContentLoaded', () => {
        // 言語切り替え
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentUiLang = btn.getAttribute('data-lang');
                updateUI();
                setActiveLangButton(currentUiLang);
                // 現在詳細が開いていれば再描画（簡易的にリロードせず、再度詳細を開き直す必要があるが、ユーザ体験を考慮して閉じる）
                if (document.getElementById('detailView').style.display === 'block') {
                    // 詳細を閉じてメインに戻る
                    backHandler();
                }
            });
        });
        setActiveLangButton(currentUiLang);
        updateUI();

        // カードクリック
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                const section = card.getAttribute('data-section');
                if (section) showDetail(section);
            });
        });

        // テーマ切替
        const themeBtn = document.getElementById('themeToggleBtn');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        else document.body.classList.add('dark');
    });

    // サービスワーカーの登録（PWAインストール対応）
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('.sw.js')
            .then(reg => console.log('ServiceWorker registered:', reg))
            .catch(err => console.error('SW registration failed:', err));
    }
</script>
</body>
</html>
