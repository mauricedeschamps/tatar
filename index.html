    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        :root {

        }
        body.light {
            --bg: #f4f7fc; --card-bg: #ffffff; --text: #1e2a3a; --text-muted: #4a627a;
            --border: #cbd5e1; --primary: #2563eb; --primary-hover: #1d4ed8; --cell-hover: #e2e8f0;
        }
        body { background-color: var(--bg); color: var(--text); font-family: system-ui, sans-serif; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        header, footer { background-color: var(--card-bg); border-bottom: 1px solid var(--border); padding: 1rem 0; }
        footer { border-top: 1px solid var(--border); border-bottom: none; margin-top: 2rem; text-align: center; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        h1 { font-size: 1.5rem; font-weight: 600; }
        .toolbar { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        button { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: var(--primary-hover); transform: scale(0.97); }
        .theme-toggle, .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.8rem; margin: 2rem 0; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 1.5rem; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .card-img { font-size: 3rem; margin-bottom: 1rem; }
        .card h3 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .detail-view { background: var(--card-bg); border-radius: 32px; padding: 1.8rem; margin: 1rem 0; border: 1px solid var(--border); }
        .back-btn { margin-bottom: 1.5rem; background: var(--border); color: var(--text); }
        .pattern-card, .phrase-card { background: var(--bg); border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid var(--primary); }
        .lang-row { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: baseline; margin: 0.5rem 0; padding: 0.5rem; border-bottom: 1px dashed var(--border); }
        .lang-text { flex: 1; font-size: 1rem; cursor: pointer; }
        .lang-text:hover { color: var(--primary); }
        .lang-label { font-weight: bold; width: 70px; color: var(--primary); }
        .romaji {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-left: 0.75rem;
            font-family: monospace;
            background: var(--card-bg);
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            border: 1px dashed var(--border);
            cursor: text;
        }
        .romaji:focus-visible {
            outline: 2px solid var(--primary);
            background: var(--bg);
            color: var(--text);
        }
        .pronoun-grid { display: flex; flex-wrap: wrap; gap: 1rem; margin: 2rem 0; }
        .pronoun-btn { background: var(--primary); color: white; padding: 0.8rem 1.3rem; border-radius: 60px; font-weight: bold; font-size: 1.1rem; }
        .pronoun-table-container { overflow-x: auto; margin-top: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 20px; }
        th, td { border: 1px solid var(--border); padding: 12px 8px; text-align: left; vertical-align: top; }
        th { background: var(--primary); color: white; }
        td { cursor: default; }
        .pronoun-romaji {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: monospace;
            background: var(--bg);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
            margin-left: 0.5rem;
            border: 1px dashed var(--border);
            cursor: text;
        }
        footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 640px) { .lang-row { flex-direction: column; } .lang-label { width: auto; } th, td { padding: 8px 4px; font-size: 0.85rem; } }
    </style>
</head>

        </div>
    </div>
    <div id="detailView" style="display: none;"></div>
</main>

<footer><div class="container"><span id="footerContact">Contact us</span><br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></div></footer>

    // 簡易ローマ字変換（編集前の初期値を生成するためだけに使用）
    function simpleRomaji(japaneseText) {
        let hira = japaneseText;
        const sortedKeys = Object.keys(kanjiToHira).sort((a,b)=>b.length - a.length);
        for (let kanji of sortedKeys) hira = hira.replace(new RegExp(kanji, 'g'), kanjiToHira[kanji]);
        const romaMap = {
            'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
            'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
            'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
            'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri',
            'る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'o','ん':'n','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge',
            'ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'ji','づ':'zu','で':'de',
            'ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe',
            'ぽ':'po','きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho','ちゃ':'cha',
            'ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
            'みゃ':'mya','みゅ':'myu','みょ':'myo','りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu',
            'ぎょ':'gyo','じゃ':'ja','じゅ':'ju','じょ':'jo','びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya',
            'ぴゅ':'pyu','ぴょ':'pyo','っ':'','ー':''
        };
        let rom = '';
        for (let i=0; i<hira.length; i++) {
            if (i+1 < hira.length && romaMap[hira.substr(i,2)]) {
                rom += romaMap[hira.substr(i,2)]; i++;
            } else {
                rom += romaMap[hira[i]] || hira[i];
            }
        }
        rom = rom.replace(/ha(?= |$)/g, 'wa').replace(/he(?= |$)/g, 'e');
        rom = rom.replace(/を/g, 'o');
        return rom;
    }

    // 編集可能なローマ字を含む日本語表示を生成 (ローカルストレージ対応)
    function makeEditableRomaji(japaneseText, id) {
        let defaultValue = simpleRomaji(japaneseText);
        // 保存されていた値があればそれを使う
        const saved = localStorage.getItem(`romaji_${id}`);
        if (saved !== null) defaultValue = saved;
        return `<span class="romaji" contenteditable="true" data-id="${id}" data-original="${japaneseText}">${defaultValue}</span>`;
    }

        { id:"pron1", name:"私 / I / Я / мин", forms:{ nom:{jp:"私"}, gen:{jp:"私の"}, acc:{jp:"私を"}, dat:{jp:"私に"}, abl:{jp:"私から/私で"} }, tt:{ nom:"мин", gen:"минем", acc:"мине", dat:"миңа", abl:"миннән" }, ru:{ nom:"я", gen:"меня", acc:"меня", dat:"мне", abl:"от меня / мной" }, en:{ nom:"I", gen:"my/mine", acc:"me", dat:"to me", abl:"from me / by me"} },

        { id:"pron3", name:"彼 / he / он / ул", forms:{ nom:{jp:"彼"}, gen:{jp:"彼の"}, acc:{jp:"彼を"}, dat:{jp:"彼に"}, abl:{jp:"彼から/で"} }, tt:{ nom:"ул", gen:"аның", acc:"аны", dat:"аңа", abl:"аннан" }, ru:{ nom:"он", gen:"его", acc:"его", dat:"ему", abl:"от него / им" }, en:{ nom:"he", gen:"his", acc:"him", dat:"to him", abl:"from him / by him"} },
        { id:"pron4", name:"彼女 / she / она / ул", forms:{ nom:{jp:"彼女"}, gen:{jp:"彼女の"}, acc:{jp:"彼女を"}, dat:{jp:"彼女に"}, abl:{jp:"彼女から/で"} }, tt:{ nom:"ул", gen:"аның", acc:"аны", dat:"аңа", abl:"аннан" }, ru:{ nom:"она", gen:"её", acc:"её", dat:"ей", abl:"от неё / ею" }, en:{ nom:"she", gen:"her", acc:"her", dat:"to her", abl:"from her / by her"} },
        { id:"pron5", name:"それ / it / оно / ул", forms:{ nom:{jp:"それ"}, gen:{jp:"それの"}, acc:{jp:"それを"}, dat:{jp:"それに"}, abl:{jp:"それから/で"} }, tt:{ nom:"ул", gen:"аның", acc:"аны", dat:"аңа", abl:"аннан" }, ru:{ nom:"оно", gen:"его", acc:"его", dat:"ему", abl:"от него / им" }, en:{ nom:"it", gen:"its", acc:"it", dat:"to it", abl:"from it / by it"} },
        { id:"pron6", name:"私達 / we / мы / без", forms:{ nom:{jp:"私達"}, gen:{jp:"私達の"}, acc:{jp:"私達を"}, dat:{jp:"私達に"}, abl:{jp:"私達から/で"} }, tt:{ nom:"без", gen:"безнең", acc:"безне", dat:"безгә", abl:"бездән" }, ru:{ nom:"мы", gen:"нас", acc:"нас", dat:"нам", abl:"от нас / нами" }, en:{ nom:"we", gen:"our", acc:"us", dat:"to us", abl:"from us / by us"} },
        { id:"pron7", name:"あなた達 / you (pl) / вы / сез", forms:{ nom:{jp:"あなた達"}, gen:{jp:"あなた達の"}, acc:{jp:"あなた達を"}, dat:{jp:"あなた達に"}, abl:{jp:"あなた達から/で"} }, tt:{ nom:"сез", gen:"сезнең", acc:"сезне", dat:"сезгә", abl:"сездән" }, ru:{ nom:"вы", gen:"вас", acc:"вас", dat:"вам", abl:"от вас / вами" }, en:{ nom:"you (pl)", gen:"your (pl)", acc:"you (pl)", dat:"to you (pl)", abl:"from you / by you (pl)"} },
        { id:"pron8", name:"彼ら / they (m) / они / алар", forms:{ nom:{jp:"彼ら"}, gen:{jp:"彼らの"}, acc:{jp:"彼らを"}, dat:{jp:"彼らに"}, abl:{jp:"彼らから/で"} }, tt:{ nom:"алар", gen:"аларның", acc:"аларны", dat:"аларга", abl:"алардан" }, ru:{ nom:"они", gen:"их", acc:"их", dat:"им", abl:"от них / ими" }, en:{ nom:"they (m)", gen:"their", acc:"them", dat:"to them", abl:"from them / by them"} },
        { id:"pron9", name:"彼女ら / they (f) / они / алар", forms:{ nom:{jp:"彼女ら"}, gen:{jp:"彼女らの"}, acc:{jp:"彼女らを"}, dat:{jp:"彼女らに"}, abl:{jp:"彼女らから/で"} }, tt:{ nom:"алар", gen:"аларның", acc:"аларны", dat:"аларга", abl:"алардан" }, ru:{ nom:"они", gen:"их", acc:"их", dat:"им", abl:"от них / ими" }, en:{ nom:"they (f)", gen:"their", acc:"them", dat:"to them", abl:"from them / by them"} }
    ];

    // UI多言語
    const uiText = {
        jp: { appTitle:"📖 タタール語 - 日本語", cardPatternsTitle:"基本文型", cardPatternsDesc:"6つの文型", cardPhrasesTitle:"50例文", cardPhrasesDesc:"日常動詞・形容詞", cardPronounsTitle:"人称代名詞", cardPronounsDesc:"全格変化表をタップで発音", footerContact:"お問い合わせ", backBtn:"戻る", patternsHeader:"基本文型", phrasesHeader:"50例文" },
        tt: { appTitle:"📖 Татар теле - Япон теле", cardPatternsTitle:"Төп грамматик конструкцияләр", cardPatternsDesc:"6 конструкция", cardPhrasesTitle:"50 мисал җөмлә", cardPhrasesDesc:"Көндәлек фигыльләр", cardPronounsTitle:"Алмашлыклар", cardPronounsDesc:"Барлык килешләр, басып тыңлау", footerContact:"Бәйләнеш", backBtn:"Кире", patternsHeader:"Төп конструкцияләр", phrasesHeader:"50 мисал" },
        ru: { appTitle:"📖 Татарский - Японский", cardPatternsTitle:"Основные конструкции", cardPatternsDesc:"6 конструкций", cardPhrasesTitle:"50 фраз", cardPhrasesDesc:"Глаголы и прилагательные", cardPronounsTitle:"Местоимения", cardPronounsDesc:"Все падежи, нажмите на ячейку", footerContact:"Контакты", backBtn:"Назад", patternsHeader:"Основные конструкции", phrasesHeader:"50 фраз" },
        en: { appTitle:"📖 Tatar - Japanese", cardPatternsTitle:"Basic Patterns", cardPatternsDesc:"6 patterns", cardPhrasesTitle:"50 Example Phrases", cardPhrasesDesc:"Essential verbs & adjectives", cardPronounsTitle:"Personal Pronouns", cardPronounsDesc:"All cases, tap any cell to hear", footerContact:"Contact us", backBtn:"Back", patternsHeader:"Basic Grammar Patterns", phrasesHeader:"50 Essential Phrases" }
    };
    let currentUiLang = 'en';

    // 音声再生
    function speakText(rawText, langCode) {
        if (!rawText) return;
        let text = (langCode === 'jp') ? rawText.replace(/私/g,'わたし').replace(/私達/g,'わたしたち') : rawText;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const langMap = { jp: 'ja-JP', tt: 'tt', ru: 'ru-RU', en: 'en-US' };
        utterance.lang = langMap[langCode] || 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    // 編集可能なローマ字を含むHTMLを生成 (文型・例文用)
    function renderLangRowWithEditableRomaji(item, langCode, text, id) {
        if (langCode === 'jp') {
            const romajiSpan = makeEditableRomaji(text, id);
            return `<div class="lang-row">
                <div class="lang-label">${langCode.toUpperCase()}</div>
                <div class="lang-text" data-lang="jp" data-text="${text.replace(/"/g, '&quot;')}">${text} ${romajiSpan}</div>
            </div>`;
        } else {
            return `<div class="lang-row">
                <div class="lang-label">${langCode.toUpperCase()}</div>
                <div class="lang-text" data-lang="${langCode}" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>
            </div>`;
        }
    }

    // 代名詞表の編集可能ローマ字セル
    function makePronounRomajiCell(jpText, id) {
        const romSpan = makeEditableRomaji(jpText, id);
        return `<td data-lang="jp" data-text="${jpText.replace(/"/g, '&quot;')}">${jpText} ${romSpan}</td>`;
    }

    // 詳細画面描画
    function showDetail(section) {
        const main = document.getElementById('mainView');
        const detail = document.getElementById('detailView');
        main.style.display = 'none';
        detail.style.display = 'block';
        let html = `<button class="back-btn" id="backToMainBtn"><i class="fas fa-arrow-left"></i> ${uiText[currentUiLang].backBtn}</button><div class="detail-view">`;

        if (section === 'patterns') {
            html += `<h2>${uiText[currentUiLang].patternsHeader}</h2>`;
            for (let p of patternsData) {
                html += `<div class="pattern-card"><h3>${p.title}</h3>`;
                html += renderLangRowWithEditableRomaji(p, 'jp', p.jp, p.id);
                html += renderLangRowWithEditableRomaji(p, 'tt', p.tt, p.id+'_tt');
                html += renderLangRowWithEditableRomaji(p, 'ru', p.ru, p.id+'_ru');
                html += renderLangRowWithEditableRomaji(p, 'en', p.en, p.id+'_en');
                html += `</div>`;
            }
        } else if (section === 'phrases') {
            html += `<h2>${uiText[currentUiLang].phrasesHeader}</h2>`;
            allPhrases.forEach((ph, idx) => {
                html += `<div class="phrase-card"><strong>${idx+1}.</strong>`;
                html += renderLangRowWithEditableRomaji(ph, 'jp', ph.jp, ph.id);
                html += renderLangRowWithEditableRomaji(ph, 'tt', ph.tt, ph.id+'_tt');
                html += renderLangRowWithEditableRomaji(ph, 'ru', ph.ru, ph.id+'_ru');
                html += renderLangRowWithEditableRomaji(ph, 'en', ph.en, ph.id+'_en');
                html += `</div>`;
            });
        } else if (section === 'pronouns') {
            html += `<h2>${uiText[currentUiLang].cardPronounsTitle}</h2>`;
            html += `<div class="pronoun-grid" id="pronounButtonsGrid"></div>`;
            html += `<div id="pronounDetailArea" style="margin-top:24px;"></div>`;
            detail.innerHTML = html;
            const grid = document.getElementById('pronounButtonsGrid');
            pronounsList.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'pronoun-btn';
                btn.innerText = p.name;
                btn.onclick = () => showPronounTable(p);
                grid.appendChild(btn);
            });
            if (pronounsList.length) showPronounTable(pronounsList[0]);
            // 発音は td の data-text で行う（編集ローマ字部分は発音しない）
            attachPronunciation(detail);
            document.getElementById('backToMainBtn').onclick = backHandler;
            return;
        }

        detail.innerHTML = html;
        attachPronunciation(detail);
        // contenteditable 要素の保存イベント
        attachSaveEvents(detail);
        document.getElementById('backToMainBtn').onclick = backHandler;
    }

    function showPronounTable(pronoun) {
        const area = document.getElementById('pronounDetailArea');
        const caseNames = { nom:"Nominative (〜は/が)", gen:"Genitive (〜の)", acc:"Accusative (〜を)", dat:"Dative (〜に/へ)", abl:"Ablative (〜から/〜で)" };
        let html = `<div class="pronoun-table-container"><table><thead><tr><th>Case</th><th>日本語</th><th>Татарча</th><th>Русский</th><th>English</th></tr></thead><tbody>`;
        for (let [caseKey, label] of Object.entries(caseNames)) {
            const jpText = pronoun.forms[caseKey].jp;
            const ttText = pronoun.tt[caseKey];
            const ruText = pronoun.ru[caseKey];
            const enText = pronoun.en[caseKey];
            const romId = `${pronoun.id}_${caseKey}`;
            html += `<tr>
                <td>${label}</td>
                ${makePronounRomajiCell(jpText, romId)}
                <td data-lang="tt" data-text="${ttText.replace(/"/g, '&quot;')}">${ttText}</td>
                <td data-lang="ru" data-text="${ruText.replace(/"/g, '&quot;')}">${ruText}</td>
                <td data-lang="en" data-text="${enText.replace(/"/g, '&quot;')}">${enText}</td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        area.innerHTML = html;
        attachPronunciation(area);
        attachSaveEvents(area);
    }

    function attachPronunciation(container) {
        container.querySelectorAll('[data-lang]').forEach(el => {
            if (el.classList && el.classList.contains('romaji')) return; // ローマ字編集部分は発音させない
            const lang = el.getAttribute('data-lang');
            const text = el.getAttribute('data-text');
            if (lang && text) {
                el.onclick = (e) => { if (e.target === el || !e.target.closest('.romaji')) speakText(text, lang); };
            }
        });
    }

    function attachSaveEvents(container) {
        container.querySelectorAll('.romaji[contenteditable="true"]').forEach(span => {
            span.removeEventListener('blur', span._saveHandler);
            const id = span.getAttribute('data-id');
            const handler = () => { saveRomaji(id, span.innerText); };
            span.addEventListener('blur', handler);
            span._saveHandler = handler;
        });
    }

    function backHandler() {
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('detailView').style.display = 'none';
        window.speechSynthesis.cancel();
    }

    function updateUI() { const t=uiText[currentUiLang]; document.getElementById('appTitle').innerText=t.appTitle; document.getElementById('cardPatternsTitle').innerHTML=t.cardPatternsTitle; document.getElementById('cardPatternsDesc').innerText=t.cardPatternsDesc; document.getElementById('cardPhrasesTitle').innerHTML=t.cardPhrasesTitle; document.getElementById('cardPhrasesDesc').innerText=t.cardPhrasesDesc; document.getElementById('cardPronounsTitle').innerHTML=t.cardPronounsTitle; document.getElementById('cardPronounsDesc').innerText=t.cardPronounsDesc; document.getElementById('footerContact').innerText=t.footerContact; }
    function setActiveLangButton(lang){ document.querySelectorAll('.lang-btn').forEach(btn=>{ if(btn.dataset.lang===lang) btn.classList.add('active'); else btn.classList.remove('active'); }); }

    // 初期化
    document.addEventListener('DOMContentLoaded',()=>{
        document.querySelectorAll('.lang-btn').forEach(btn=>{ btn.onclick=()=>{ currentUiLang=btn.dataset.lang; updateUI(); setActiveLangButton(currentUiLang); if(document.getElementById('detailView').style.display==='block') backHandler(); }; });
        setActiveLangButton(currentUiLang); updateUI();
        document.querySelectorAll('.card').forEach(card=>{ card.onclick=()=>{ const sec=card.dataset.section; if(sec) showDetail(sec); }; });
        const themeBtn=document.getElementById('themeToggleBtn');
        themeBtn.onclick=()=>{ document.body.classList.toggle('light'); localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark'); };
        if(localStorage.getItem('theme')==='light') document.body.classList.add('light'); else document.body.classList.add('dark');
        if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js', { scope: '/' }).then(reg=>console.log('SW registered', reg)).catch(err=>console.error('SW failed', err)); }
    });
</script>
